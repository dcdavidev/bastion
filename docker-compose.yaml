services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=bastion
      - POSTGRES_PASSWORD=bastion
      - POSTGRES_DB=bastion
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bastion:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8287:8287"
    env_file:
      - .env
    environment:
      - BASTION_PORT=8287
      - BASTION_DATABASE_URL=postgres://bastion:bastion@db:5432/bastion?sslmode=disable
      - BASTION_JWT_SECRET=${BASTION_JWT_SECRET}
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
