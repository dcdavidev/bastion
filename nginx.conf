server {
    listen 80;
    server_name bastion.local;

    # Dimensioni massime per il caricamento di file (se necessario)
    client_max_body_size 10M;

    location / {
        # Indirizzo del server Bastion
        proxy_pass http://127.0.0.1:8287;
        
        # Configurazione Header per il Reverse Proxy
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Passaggio dell'IP reale dell'utente al backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Error pages (opzionale)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
